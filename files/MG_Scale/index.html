<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nachhaltigkeitsfragebogen</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
    <div id="content" class="fade show"></div>
</div>
<div class="progress-container">
    <img id="boot" src="images/boot.png" alt="Boot">
    <div id="plant-container-oekologie" class="plant-container">
        <img class="plant" id="plant-oekologie" src="images/plant1_blooms.PNG" alt="Pflanze Ökologie">
        <div class="fire" id="fire-oekologie">
            <img src="images/fire1.PNG" class="fire-frame frame1">
            <img src="images/fire2.PNG" class="fire-frame frame2">
        </div>
    </div>
    <div id="plant-container-soziales" class="plant-container">
        <img class="plant" id="plant-soziales" src="images/plant2_blooms.PNG" alt="Pflanze Soziales">
        <div class="fire" id="fire-soziales">
            <img src="images/fire1.PNG" class="fire-frame frame1">
            <img src="images/fire2.PNG" class="fire-frame frame2">
        </div>
    </div>
    <div id="plant-container-oekonomie" class="plant-container">
        <img class="plant" id="plant-oekonomie" src="images/plant3_blooms.PNG" alt="Pflanze Ökonomie">
        <div class="fire" id="fire-oekonomie">
            <img src="images/fire1.PNG" class="fire-frame frame1">
            <img src="images/fire2.PNG" class="fire-frame frame2">
        </div>
    </div>
</div>

<script src="questions.js"></script>
<script src="script.js"></script>
</body>
</html>
